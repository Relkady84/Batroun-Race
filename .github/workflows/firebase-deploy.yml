name: Deploy to Firebase Hosting + Firestore rules

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: firebase-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: firebase deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.repository == 'Relkady84/Batroun-Race'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy hosting + Firestore rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ]; then
            echo "::error::FIREBASE_TOKEN repo secret is not set."
            echo "Run 'firebase login:ci' on any desktop, then add the printed token to"
            echo "https://github.com/Relkady84/Batroun-Race/settings/secrets/actions"
            echo "as FIREBASE_TOKEN."
            exit 1
          fi
          firebase deploy \
            --only hosting,firestore:rules \
            --non-interactive \
            --token "$FIREBASE_TOKEN"
