<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#08172b">
<title>Race Ticket — Batroun Race 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap">
<style>
  :root{
    --bg1:#08172b; --bg2:#0d2140;
    --ink:#0b1726; --paper:#ffffff; --muted:#5b6c80; --line:#e2e8f0;
    --accent:#21b3a7; --accent2:#3dd6c6;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;min-height:100%;
            background:linear-gradient(180deg,var(--bg1),var(--bg2));
            color:var(--ink);
            font:15px/1.55 'Inter',system-ui,-apple-system,Segoe UI,Roboto;
            -webkit-font-smoothing:antialiased;
            -webkit-text-size-adjust:100%}
  .page{max-width:640px;margin:0 auto;
        padding:max(12px,env(safe-area-inset-top)) max(10px,env(safe-area-inset-right)) 32px max(10px,env(safe-area-inset-left))}

  .toolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:10px}
  .btn{appearance:none;border:0;border-radius:12px;padding:12px 18px;
       font:inherit;font-weight:800;cursor:pointer;color:#062028;
       background:linear-gradient(180deg,var(--accent2),var(--accent));
       box-shadow:0 6px 18px rgba(33,179,167,.35);
       min-height:44px}
  .btn:active{transform:scale(.98)}
  .btn.sec{background:rgba(255,255,255,.94);color:#1a2b3d}

  .ticket{background:var(--paper);color:var(--ink);border-radius:18px;
          overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.45);
          border:1px solid rgba(0,0,0,.04)}

  .ticket-header{background:linear-gradient(135deg,#08172b 0%,#11365e 100%);
                 color:#ecf6ff;padding:22px 22px 26px;text-align:center;position:relative}
  .ticket-header::after{content:"";position:absolute;left:-10px;right:-10px;bottom:-10px;height:20px;
                        background:radial-gradient(circle at 10px 10px, var(--paper) 9px, transparent 10px) 0 0/20px 20px}
  /* Optional sponsor / partner marks in the ticket header. Default to
     the top corners (so legacy string-format theme.ticketLeftLogo /
     ticketRightLogo values still land in the corners after the editor
     ships). When the new {src,x,y,scale} object format is present, the
     live-fetch script below sets inline left/top/width straight from
     admin's drag-and-resize state, with maxWidth/maxHeight cleared so
     the scale value is what wins. */
  .ticket-sponsor{position:absolute;top:10px;max-height:40px;max-width:110px;
                  object-fit:contain;z-index:2}
  .ticket-sponsor.left{left:14px}
  .ticket-sponsor.right{right:14px}
  @media (max-width:520px){
    .ticket-sponsor{max-height:32px;max-width:84px;top:8px}
    .ticket-sponsor.left{left:10px}
    .ticket-sponsor.right{right:10px}
  }
  .brand{font-weight:900;font-size:.74rem;letter-spacing:.22em;
         text-transform:uppercase;color:var(--accent2);margin:0 0 4px}
  .ticket-title{margin:0;font-size:clamp(20px,5.2vw,28px);font-weight:900;letter-spacing:-.01em;color:#fff}
  .ticket-sub{color:#a9c5dd;margin:6px 0 0;font-size:.92rem;word-break:break-word}

  .ticket-body{padding:24px 20px 16px}

  /* QR + reference / bib block ──────────────────────────────────────────
     On wider screens it sits side-by-side; on phones it stacks with the
     QR centered and the codes neatly below it. */
  .qr-row{display:flex;gap:18px;align-items:center;justify-content:center;
          flex-wrap:wrap;padding:6px 0 4px}
  .qr-card{background:#ffffff;padding:10px;border-radius:14px;border:1px solid var(--line);
           display:inline-block;line-height:0}
  .qr-card > div, .qr-card canvas, .qr-card img{
    display:block;
    width:clamp(180px,55vw,220px)!important;
    height:clamp(180px,55vw,220px)!important
  }
  .qr-side{flex:1;min-width:0;max-width:280px;text-align:left}
  .qr-label{font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
            font-weight:700;margin:0 0 4px}
  .ref{display:inline-block;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
       font-size:clamp(1rem,3.6vw,1.2rem);font-weight:900;color:var(--accent);letter-spacing:1.5px;
       background:rgba(33,179,167,.08);border:1px dashed rgba(33,179,167,.4);
       padding:8px 14px;border-radius:10px;user-select:all;margin:0 0 14px;
       word-break:break-all;max-width:100%}
  .bib-big{font-weight:900;font-size:clamp(1.8rem,8vw,2.2rem);
           letter-spacing:.5px;color:var(--accent);line-height:1;margin:0}

  /* Info grid — auto-wraps based on available width. */
  .grid{display:grid;gap:10px;margin:14px 0 4px;
        grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .grid.three{grid-template-columns:repeat(auto-fit,minmax(130px,1fr))}
  .grid > div{background:#f4f7fb;border:1px solid var(--line);border-radius:12px;padding:10px 12px;min-width:0}
  .grid label{display:block;font-size:.66rem;text-transform:uppercase;letter-spacing:.08em;
              color:var(--muted);margin:0 0 4px;font-weight:700}
  .grid .v{font-weight:800;font-size:.98rem;word-break:break-word;color:var(--ink)}
  .grid .v.big{font-size:clamp(1.4rem,5vw,1.55rem);letter-spacing:.5px;color:var(--accent)}
  .grid .full{grid-column:1/-1}

  .stub{margin-top:18px;border-top:2px dashed var(--line);padding-top:14px;
        display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;
        font-size:.85rem;color:var(--muted)}
  .stub strong{color:var(--ink)}

  .hint{margin:14px 20px 8px;padding:12px 14px;background:#f8fafc;border:1px solid var(--line);
        border-radius:12px;color:#36495e;font-size:.85rem;line-height:1.5}
  .hint strong{color:var(--ink)}
  /* Bib-pickup schedule. white-space:pre preserves the line breaks the
     admin types into theme.bibPickupText AND prevents lines from wrapping
     mid-phrase. font-size auto-shrinks via clamp() so even long lines
     ("- 6 July 2026: Experts Sport, Dbayyeh from 8 am to 3 pm") fit on
     one row on narrow phones without forcing horizontal page scroll.
     overflow-x:auto inside the block is a safety net if a line is still
     too long at the smallest font — user scrolls the block, not the page. */
  .pickup{margin:0 auto 22px;padding:0 20px;text-align:center;line-height:1.5;
          color:#0f2944;font-weight:600}
  .pickup-inner{display:inline-block;text-align:left;white-space:pre;max-width:100%;
                font-size:clamp(.72rem, 3vw, .92rem);overflow-x:auto;
                -webkit-overflow-scrolling:touch}
  @media (max-width:520px){
    .pickup{padding:0 14px}
  }

  /* Mobile-tuned spacing & layout — applies to most phones. */
  @media (max-width:520px){
    .page{padding:10px 8px 28px}
    .toolbar{justify-content:stretch}
    .toolbar .btn{flex:1;width:100%}
    .ticket-header{padding:18px 16px 22px}
    .ticket-body{padding:18px 14px 14px}
    .qr-row{flex-direction:column;gap:12px}
    .qr-side{text-align:center;max-width:none;width:100%}
    .ref{margin-bottom:10px}
    .hint{margin:12px 14px 18px;font-size:.82rem}
  }

  /* Print → "Save as PDF" path. Strip the page background, hide the
     toolbar, and let the ticket sit cleanly on a single page. */
  @media print{
    html,body{background:#fff!important;color:#000}
    .toolbar{display:none!important}
    .ticket{box-shadow:none;border:1px solid #d0d6df;page-break-inside:avoid}
    .page{max-width:none;margin:0;padding:0}
    .ticket-header{background:#08172b!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    a[href]:after{content:""}
  }
</style>
</head>
<body>
<main class="page">
  <div class="toolbar">
    <button class="btn sec" onclick="window.print()">Save as PDF / Print</button>
  </div>

  <article class="ticket" id="ticket">
    <div class="ticket-header">
      <img class="ticket-sponsor left"  id="sponsorLeft"  alt="" hidden>
      <img class="ticket-sponsor right" id="sponsorRight" alt="" hidden>
      <p class="brand">Batroun Race 2026</p>
      <h1 class="ticket-title">Official Race Ticket</h1>
      <p class="ticket-sub" id="subName">Present this ticket on race day</p>
    </div>

    <div class="ticket-body">
      <div class="qr-row">
        <div class="qr-card"><div id="qr" aria-label="QR code"></div></div>
        <div class="qr-side">
          <p class="qr-label">Reference code</p>
          <div class="ref" id="ref">—</div>
          <p class="qr-label">Bib number</p>
          <p class="bib-big" id="bib">—</p>
        </div>
      </div>

      <div class="grid">
        <div><label>Participant</label><div class="v" id="name">—</div></div>
        <div><label>Category</label><div class="v" id="cat">—</div></div>
      </div>
      <div class="grid three">
        <div><label>Race day</label><div class="v" id="date">—</div></div>
        <div><label>Start time</label><div class="v" id="start">—</div></div>
        <div><label>Amount paid</label><div class="v" id="amount">—</div></div>
      </div>
      <div class="grid">
        <div class="full"><label>Location</label><div class="v" id="loc">Batroun</div></div>
      </div>

      <div class="stub">
        <div><strong>Status:</strong> <span id="status">Confirmed</span></div>
        <div>Batroun Race · <span id="year"></span></div>
      </div>
    </div>

    <p class="hint">
      <strong>Show this QR at bib pickup:</strong>
    </p>
    <!-- Bib-pickup schedule. Pre-rendered with the same default as the
         admin's editable field so it appears instantly while Firestore
         loads. The IIFE below overrides this with theme.bibPickupText
         when the admin has customised it. -->
    <div class="pickup">
      <span class="pickup-inner" id="pickupSchedule">- 6 July 2026: Experts Sport, Dbayyeh
- 8 July 2026: Batroun</span>
    </div>
  </article>
</main>

<script>
const COMPETITION_ID = "batroun-race-2026";
const params = new URLSearchParams(location.search);
const get = (k) => (params.get(k) || "").trim();

const ref    = get("ref");
const name   = get("name");
const bib    = get("bib");
const cat    = get("cat");
const date   = get("date");
const start  = get("start");
const loc    = get("loc");
const amount   = get("amount");
const status   = get("status");
const color    = get("color");
const teammate = get("teammate");

function set(id, v, fallback = "—") {
  const el = document.getElementById(id);
  if (el) el.textContent = v || fallback;
}
set("ref",    ref);
// Relay teams share one bib — show both names on the participant line.
set("name",   teammate ? `${name} + ${teammate}` : name);
set("bib",    bib);

set("cat",    cat);
set("amount", amount);

function renderDate(s) {
  if (!s) { document.getElementById("year").textContent = new Date().getFullYear(); set("date", ""); return; }
  const d = new Date(s);
  if (isNaN(d)) { set("date", s); document.getElementById("year").textContent = new Date().getFullYear(); return; }
  set("date", d.toLocaleDateString("en-GB", { weekday:"short", day:"numeric", month:"long", year:"numeric" }));
  document.getElementById("year").textContent = d.getFullYear();
}
function renderStart(s) { set("start", s || "—"); }
function renderLoc(s)   { set("loc",   s || "Batroun"); }
function renderColor(c) {
  if (c && /^#[0-9a-fA-F]{6}$/.test(c)) {
    const bibEl = document.getElementById("bib");
    if (bibEl) bibEl.style.color = c;
  }
}
// Expose so the live-override module below can refresh these
// when Firestore returns updated competition/category data.
window.renderDate  = renderDate;
window.renderStart = renderStart;
window.renderLoc   = renderLoc;
window.renderColor = renderColor;
window.set         = set;

renderDate(date);
renderStart(start);
renderLoc(loc);
renderColor(color);
if (status) {
  const s = status.toLowerCase();
  set("status", s === "free" ? "Free entry (confirmed)" : s === "paid" ? "Paid · Confirmed" : status);
}

if (name) document.getElementById("subName").textContent = name + " — show this at pickup";

document.title = name ? `Race Ticket — ${name}` : "Race Ticket — Batroun Race";
</script>
<!-- Live override: if the admin updated raceDay / raceStartTime / raceLocation
     or the category's startTime / bibColor after this ticket URL was generated,
     pull the latest values from Firestore on load. URL params are the fallback
     when Firestore is unreachable (offline / blocked / first paint). -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyChNfEHu5FhaNIe1Y7_Q_SaVSXmfHcfUQA",
  authDomain: "batroun-race.firebaseapp.com",
  projectId: "batroun-race",
  storageBucket: "batroun-race.firebasestorage.app",
  messagingSenderId: "175612171118",
  appId: "1:175612171118:web:96fc6e09ec599758f9277f"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const COMPETITION_ID_LIVE = "batroun-race-2026";
const params = new URLSearchParams(location.search);
const catId  = (params.get("cat_id") || "").trim();

function applyTicketSponsor(elId, value) {
  if (!value) return;
  const el = document.getElementById(elId);
  if (!el) return;
  if (typeof value === "string") {
    const src = value.trim();
    if (!src) return;
    el.src = src;
    el.hidden = false;
    return;
  }
  const src = (value.src || "").trim();
  if (!src) return;
  el.src = src;
  // Object format: override the corner-default CSS with the admin's
  // drag-and-resize values. The right-side default rule sets `right:14px`,
  // so we explicitly clear right / bottom to avoid CSS resolving width
  // from two anchored edges. Clearing max-width / max-height lets the
  // saved scale% win against the 110px cap.
  el.style.left   = Number(value.x) + "%";
  el.style.top    = Number(value.y) + "%";
  el.style.right  = "auto";
  el.style.bottom = "auto";
  el.style.width     = Number(value.scale) + "%";
  el.style.height    = "auto";
  el.style.maxWidth  = "none";
  el.style.maxHeight = "none";
  el.hidden = false;
}

(async () => {
  try {
    const [compSnap, catSnap, themeSnap] = await Promise.all([
      getDoc(doc(db, "competitions", COMPETITION_ID_LIVE)),
      catId ? getDoc(doc(db, "competitions", COMPETITION_ID_LIVE, "categories", catId)) : Promise.resolve(null),
      getDoc(doc(db, "competitions", COMPETITION_ID_LIVE, "config", "theme"))
    ]);
    const c = compSnap.exists() ? compSnap.data() : {};
    const cat = catSnap && catSnap.exists() ? catSnap.data() : {};
    const theme = themeSnap.exists() ? themeSnap.data() : {};
    const liveRaceDay =
      typeof c.raceDay === "string" ? c.raceDay.slice(0,10) :
      c.raceDay?.toDate ? c.raceDay.toDate().toISOString().slice(0,10) : null;
    if (liveRaceDay) window.renderDate(liveRaceDay);
    const liveStart = cat.startTime || c.raceStartTime || null;
    if (liveStart) window.renderStart(liveStart);
    if (c.raceLocation) window.renderLoc(c.raceLocation);
    if (cat.bibColor)   window.renderColor(cat.bibColor);
    // Refresh the category name + sub-question label if the admin renamed
    // them after this ticket URL was first generated.
    if (cat.name) {
      const subQ = params.get("subQuestionAnswer") || "";
      window.set("cat", cat.name + (subQ ? " — " + subQ : ""));
    }
    // Bib pickup schedule — sourced from the same theme.bibPickupText the
    // post-payment WhatsApp message uses, so editing once in admin updates
    // both surfaces. The static HTML above already shows the default; this
    // only overrides when the admin has typed a custom block.
    const customPickup = (theme.bibPickupText || "").trim();
    if (customPickup) {
      const el = document.getElementById("pickupSchedule");
      if (el) el.textContent = customPickup;
    }
    // Sponsor / partner marks in the ticket header. Either side may be
    // unset — only the slots the admin filled in light up. Accepts the
    // legacy string format (just a data URL / src — corner-positioned by
    // CSS) and the new object format ({src, x, y, scale} — exact position
    // + size as dragged in admin, as % of the header).
    applyTicketSponsor("sponsorLeft",  theme.ticketLeftLogo);
    applyTicketSponsor("sponsorRight", theme.ticketRightLogo);
  } catch (err) {
    // Stay with the URL-param values silently — they are the fallback.
    console.warn("live-ticket fetch failed, using URL values:", err);
  }
})();
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  // qrcodejs renders at a fixed pixel size. Pick a size based on the
  // viewport so the QR is crisp on phones without being huge on desktop.
  const qrPx = Math.min(220, Math.max(180, Math.floor(window.innerWidth * 0.55)));
  new QRCode(document.getElementById("qr"), {
    text: (new URLSearchParams(location.search)).get("ref") || "BATROUN-RACE",
    width: qrPx, height: qrPx, correctLevel: QRCode.CorrectLevel.M,
    colorDark: "#000000", colorLight: "#ffffff"
  });
</script>
</body>
</html>
