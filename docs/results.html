<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#08172b">
<title>Results — Batroun Race 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap">
<style>
  :root{--bg1:#08172b;--bg2:#0d2140;--ink:#eaf1fb;--muted:#93a7c4;--line:rgba(255,255,255,.12);
        --accent:#3dd6c6;--accent2:#56a8ff;--card:rgba(255,255,255,.04)}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;background:linear-gradient(180deg,var(--bg1),var(--bg2));
            color:var(--ink);font:15px/1.55 'Inter',system-ui,-apple-system,Segoe UI,Roboto;
            -webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
  .wrap{max-width:960px;margin:0 auto;padding:max(16px,env(safe-area-inset-top)) 14px 40px}
  header{display:flex;align-items:center;gap:14px;margin:8px 0 18px}
  #brandLink{display:none;align-items:center;flex:0 0 auto;line-height:0}
  #brandLogo{height:56px;width:auto;display:block}
  .head-text{display:flex;flex-direction:column;gap:2px;min-width:0}
  .brand{font-weight:900;font-size:clamp(22px,6vw,34px);letter-spacing:.02em;text-transform:uppercase;color:var(--accent);margin:0;line-height:1.05}
  h1{margin:4px 0 0;font-size:clamp(15px,3.8vw,21px);font-weight:700;color:var(--muted);letter-spacing:.16em;text-transform:uppercase}
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px}

  /* Pill sub-tabs (category / gender / age category) */
  .subtabs-wrap{background:rgba(0,0,0,.16);border:1px solid var(--line);border-radius:12px;
                padding:12px 12px 4px;margin-bottom:14px}
  .subtab-row{margin-bottom:10px}
  .st-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);
            font-weight:700;margin-bottom:5px}
  .subtabs{display:flex;flex-wrap:wrap;gap:6px}
  .subtab{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--line);
          border-radius:999px;padding:6px 15px;font-size:.86rem;font-weight:700;cursor:pointer;
          white-space:nowrap;transition:background .12s,color .12s,border-color .12s;font-family:inherit}
  .subtab:hover{color:var(--ink);border-color:var(--accent)}
  .subtab.active{background:rgba(61,214,198,.16);color:var(--accent);border-color:var(--accent)}
  .filter-hint{font-size:.82rem;color:var(--muted);margin:0 0 12px}

  .legend{font-size:.82rem;color:var(--muted);margin:0 0 10px;font-weight:600}
  .table-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:.92rem}
  th,td{padding:9px 8px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  th{color:var(--muted);font-weight:700;font-size:.78rem;text-transform:uppercase;letter-spacing:.03em}
  td.name{white-space:normal;font-weight:700}
  /* Fit the standings on a phone without side-scrolling: tighter cells,
     smaller text, and let the headers + names wrap instead of forcing width. */
  @media (max-width:640px){
    .wrap{padding-left:8px;padding-right:8px}
    #brandLogo{height:44px}
    table{font-size:.8rem}
    th,td{padding:7px 5px}
    th{font-size:.62rem;letter-spacing:0;white-space:normal}
    td.name{white-space:normal}
  }
  th.s{cursor:pointer}
  table:not(.show-cat) .col-cat{display:none}
  tbody tr.p1 td{background:rgba(255,207,64,.16)}
  tbody tr.p2 td{background:rgba(201,205,212,.16)}
  tbody tr.p3 td{background:rgba(208,139,70,.16)}
  tbody tr.p1 td:first-child{box-shadow:inset 4px 0 0 #ffcf40}
  tbody tr.p2 td:first-child{box-shadow:inset 4px 0 0 #c9cdd4}
  tbody tr.p3 td:first-child{box-shadow:inset 4px 0 0 #d08b46}
  .pos{font-weight:900}
  .muted{color:var(--muted)}
  .empty{text-align:center;color:var(--muted);padding:26px 10px}
  .updated{text-align:center;color:var(--muted);font-size:.8rem;margin-top:14px}
</style>
</head>
<body>
<main class="wrap">
  <header>
    <a id="brandLink" href="https://www.batrounrace.com" target="_blank" rel="noopener" aria-label="Batroun Race — main website">
      <img id="brandLogo" alt="Batroun Race">
    </a>
    <div class="head-text">
      <p class="brand">Batroun Race 2026</p>
      <h1>Results</h1>
    </div>
  </header>

  <div class="card">
    <div class="subtabs-wrap" id="subtabs" style="display:none">
      <p class="filter-hint">Tap a category, then a gender or age group to filter the standings.</p>
      <div class="subtab-row">
        <div class="st-label">Category</div>
        <div class="subtabs" id="catTabs"></div>
      </div>
      <div class="subtab-row" id="genderRow">
        <div class="st-label">Gender</div>
        <div class="subtabs" id="genderTabs"></div>
      </div>
      <div class="subtab-row" id="ageRow">
        <div class="st-label">Age category</div>
        <div class="subtabs" id="ageTabs"></div>
      </div>
    </div>
    <p class="legend">🥇 1st · 🥈 2nd · 🥉 3rd</p>
    <div class="table-wrap">
      <table id="tbl">
        <thead><tr>
          <th>#</th>
          <th class="s" data-s="name">Name</th>
          <th class="s" data-s="bib">Bib</th>
          <th class="s" data-s="gender">Gender</th>
          <th class="col-cat s" data-s="catName">Category</th>
          <th class="s" data-s="sub">Age category</th>
          <th class="s" data-s="rank">Rank</th>
          <th class="s" data-s="result">Result</th>
        </tr></thead>
        <tbody id="rows"><tr><td colspan="8" class="empty">Loading…</td></tr></tbody>
      </table>
    </div>
  </div>
  <div class="updated" id="updated"></div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyChNfEHu5FhaNIe1Y7_Q_SaVSXmfHcfUQA",
  authDomain: "batroun-race.firebaseapp.com",
  projectId: "batroun-race",
  storageBucket: "batroun-race.firebasestorage.app",
  messagingSenderId: "175612171118",
  appId: "1:175612171118:web:96fc6e09ec599758f9277f"
};
const db = getFirestore(initializeApp(firebaseConfig));
const COMPETITION_ID = "batroun-race-2026";

const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

let ENTRIES = [], CATS = [];
let SEL = { catId: "", gender: "", age: "" };  // gender "" = overall; age "" = all ages
let SORT = { key:"rank", dir:"asc" };

// Reduce a bracket label to just its age range, e.g.
// "Seniors Men-Women 20-34 (1992-2006)" -> "20-34"  ·  "Masters 70+ (…)" -> "70+"
const RACE_YEAR = Number((COMPETITION_ID.match(/(\d{4})/) || [])[1]) || 0;
function cleanAgeLabel(s){
  const str = String(s || "").trim();
  if (!str) return "";
  let m = str.match(/(?<!\d)(\d{1,2})\s*\+/);
  if (m) return `${m[1]}+`;
  m = str.match(/(?<!\d)(\d{1,2})\s*(?:[-–—]|to)\s*(\d{1,2})(?!\d)/i);
  if (m) return `${m[1]}-${m[2]}`;
  m = str.match(/(\d{4})\s*(?:[-–—]|to|\s)\s*(\d{4})/i);
  if (m && RACE_YEAR) return `${RACE_YEAR - Math.max(+m[1],+m[2])}-${RACE_YEAR - Math.min(+m[1],+m[2])}`;
  return str;
}

// Same gender buckets as the admin standings.
function genderBucket(g){
  const s = String(g||"").trim().toLowerCase();
  if (!s) return "";
  const MEN = ["m","male","man","men","homme","boy",
    "ذكر","ذكور","رجل","رجال","ولد","صبي"];
  const WOMEN = ["f","w","female","woman","women","femme","girl",
    "أنثى","أنثي","انثى","انثي","إناث","اناث","امرأة","امراة","بنت","فتاة","نساء","سيدة"];
  if (MEN.includes(s)) return "Men";
  if (WOMEN.includes(s)) return "Women";
  return String(g).trim();
}
function catIsRelay(id){ return !!(CATS.find(c => c.id === id)?.isRelay); }
// The snapshot's gender is already the computed bucket (Men / Women / Mixed for
// relay teams); genderBucket() is idempotent and still handles raw values from
// older snapshots.
function gb(e){ return genderBucket(e.gender); }

// Unranked entries (no rank AND no time) sort to the BOTTOM. Number("") === 0,
// so an empty rank must be forced to Infinity or it would sort to the top.
function rankKey(v){
  if (v === "" || v == null) return Infinity;
  const n = Number(v);
  return Number.isFinite(n) ? n : Infinity;
}
function rankCmp(a,b){
  const ka = rankKey(a.rank), kb = rankKey(b.rank);
  if (ka !== kb) return ka - kb;
  const sa = String(a.result||""), sb = String(b.result||"");
  if (sa && sb) return sa.localeCompare(sb, undefined, { numeric:true });
  if (sa) return -1; if (sb) return 1; return 0;
}
function sortRows(rows){
  const k = SORT.key, sign = SORT.dir === "asc" ? 1 : -1;
  const arr = rows.slice();
  if (k === "rank") arr.sort((a,b) => sign * rankCmp(a,b));
  else arr.sort((a,b) => sign * String(a[k] ?? "").localeCompare(String(b[k] ?? ""), undefined, { numeric:true, sensitivity:"base" }));
  return arr;
}
const rowKey = e => String(e.bib ?? "") + "|" + String(e.name ?? "");
// Keys of the overall podium (top 3 per gender, by time) within a pool.
function overallPodiumKeys(pool){
  const keys = new Set();
  for (const g of ["Men","Women"]){
    pool.filter(e => gb(e) === g && e.rank !== "" && e.rank != null)
        .slice().sort(rankCmp).slice(0,3).forEach(e => keys.add(rowKey(e)));
  }
  return keys;
}
function catExcludesOverall(id){ return !!(CATS.find(c => c.id === id)?.excludeOverallFromAge); }
function renderTabs(){
  const catIds = [...new Set(ENTRIES.map(e => e.catId))];
  const catOpts = CATS.filter(c => catIds.includes(c.id));
  const catBtns = catOpts.map(c => ({ id:c.id, name:c.name }));
  const valid = catBtns.map(c => c.id);
  if (!valid.includes(SEL.catId)) SEL.catId = catBtns[0]?.id || "";
  $("#catTabs").innerHTML = catBtns.map(c =>
    `<button class="subtab ${SEL.catId===c.id?"active":""}" data-cat="${esc(c.id)}">${esc(c.name)}</button>`).join("");

  const isAll = SEL.catId === "__all__";
  const scope = isAll ? ENTRIES : ENTRIES.filter(e => e.catId === SEL.catId);

  // Gender tabs — Men / Women (and Mixed for cross-gender relay teams), shown
  // for every category including relay. Hidden only when there's no gender data.
  const genderRow = $("#genderRow");
  const buckets = [...new Set(scope.map(gb).filter(Boolean))];
  const ord = g => g==="Men"?0 : g==="Women"?1 : g==="Mixed"?2 : 3;
  buckets.sort((a,b) => ord(a)-ord(b) || a.localeCompare(b));
  if (!buckets.includes(SEL.gender)) SEL.gender = "";
  if (!buckets.length){
    genderRow.style.display = "none";
  } else {
    genderRow.style.display = "";
    const tabs = [{v:"",label:"Overall"}, ...buckets.map(g=>({v:g,label:g}))];
    $("#genderTabs").innerHTML = tabs.map(t =>
      `<button class="subtab ${SEL.gender===t.v?"active":""}" data-gender="${esc(t.v)}">${esc(t.label)}</button>`).join("");
  }

  const ageRow = $("#ageRow");
  const gScope = SEL.gender ? scope.filter(e => gb(e) === SEL.gender) : scope;
  const ages = [...new Set(gScope.map(e => String(e.sub||"").trim()).filter(Boolean))]
    .sort((a,b) => a.localeCompare(b, undefined, { numeric:true }));
  if (!ages.length){
    ageRow.style.display = "none";
    SEL.age = "";
  } else {
    ageRow.style.display = "";
    if (!ages.includes(SEL.age)) SEL.age = "";
    const tabs = [{v:"",label:"All ages"}, ...ages.map(a=>({v:a,label:a}))];
    $("#ageTabs").innerHTML = tabs.map(t =>
      `<button class="subtab ${SEL.age===t.v?"active":""}" data-age="${esc(t.v)}">${esc(t.label)}</button>`).join("");
  }
}

function render(){
  renderTabs();
  const isAll = SEL.catId === "__all__";
  const tb = $("#rows");
  document.getElementById("tbl").classList.toggle("show-cat", isAll);
  document.querySelectorAll("th.s").forEach(th => {
    th.classList.remove("asc","desc");
    if (th.dataset.s === SORT.key) th.classList.add(SORT.dir);
  });
  let pool = isAll ? ENTRIES.slice() : ENTRIES.filter(e => e.catId === SEL.catId);
  if (SEL.gender) pool = pool.filter(e => gb(e) === SEL.gender);
  let rows;
  if (SEL.age){
    // Age-category podium: 3 fastest in the age group. If this category has a
    // separate overall award, its overall top 3 (per gender) are skipped so
    // others place; otherwise everyone is eligible.
    const skip = (!isAll && catExcludesOverall(SEL.catId)) ? overallPodiumKeys(pool) : new Set();
    rows = pool.filter(e => String(e.sub||"").trim() === SEL.age
                            && !skip.has(rowKey(e))
                            && e.rank !== "" && e.rank != null)
               .sort(rankCmp).slice(0, 3);
  } else {
    rows = sortRows(pool);
  }
  if (!rows.length){ tb.innerHTML = `<tr><td colspan="8" class="empty">No results in this selection.</td></tr>`; return; }
  // Medals (🥇🥈🥉) show on any Men / Women podium (in rank order): the overall
  // Men / Women, an age group, and relay Men / Women — but NOT the combined
  // "Overall" (Men+Women) view. Positions still number every row.
  const podium = !!SEL.gender && SORT.key === "rank" && SORT.dir === "asc";
  let pos = 0;
  tb.innerHTML = rows.map(e => {
    const ranked = e.rank !== "" && e.rank != null;
    const p = ranked ? ++pos : null;
    const medal = podium && ranked && p <= 3;
    return `
    <tr class="${medal ? `p${p}` : ""}">
      <td class="pos">${ranked ? `${p}${medal ? ` ${["🥇","🥈","🥉"][p-1]}` : ""}` : "—"}</td>
      <td class="name">${esc(e.name || "—")}</td>
      <td>${esc(String(e.bib ?? "—"))}</td>
      <td>${esc(gb(e) || "—")}</td>
      <td class="col-cat">${esc(e.catName || "—")}</td>
      <td>${esc(e.sub || "—")}</td>
      <td>${ranked ? esc(String(e.rank)) : "—"}</td>
      <td><strong>${e.result ? esc(e.result) : "—"}</strong></td>
    </tr>`;
  }).join("");
}

// Pill-tab clicks (delegated). Category resets gender+age; gender resets age.
$("#catTabs").addEventListener("click", e => {
  const b = e.target.closest("[data-cat]"); if (!b) return;
  SEL.catId = b.dataset.cat; SEL.gender = ""; SEL.age = "";
  SORT = { key:"rank", dir:"asc" };
  render();
});
$("#genderTabs").addEventListener("click", e => {
  const b = e.target.closest("[data-gender]"); if (!b) return;
  SEL.gender = b.dataset.gender; SEL.age = "";
  render();
});
$("#ageTabs").addEventListener("click", e => {
  const b = e.target.closest("[data-age]"); if (!b) return;
  SEL.age = b.dataset.age;
  render();
});
document.querySelectorAll("th.s").forEach(th => th.addEventListener("click", () => {
  const k = th.dataset.s;
  if (SORT.key === k) SORT.dir = SORT.dir === "asc" ? "desc" : "asc";
  else { SORT.key = k; SORT.dir = "asc"; }
  render();
}));

// Show the Batroun Race logo (theme.logoImage) top-left, like the admin
// dashboard. Cached in localStorage for a day so most views cost no read.
const LOGO_CACHE_KEY = "br-results-logo-" + COMPETITION_ID + "-v1";
const LOGO_TTL_MS = 24 * 60 * 60 * 1000;
(async () => {
  const img = $("#brandLogo");
  if (!img) return;
  let logo = null;
  try {
    const o = JSON.parse(localStorage.getItem(LOGO_CACHE_KEY) || "null");
    if (o && (Date.now() - o.t) < LOGO_TTL_MS) {
      logo = o.logo;
    } else {
      const snap = await getDoc(doc(db, "competitions", COMPETITION_ID, "config", "theme"));
      logo = snap.exists() ? (snap.data().logoImage || null) : null;
      try { localStorage.setItem(LOGO_CACHE_KEY, JSON.stringify({ t: Date.now(), logo })); } catch (_) {}
    }
  } catch (_) {}
  if (logo) { img.src = logo; const link = $("#brandLink"); if (link) link.style.display = "inline-flex"; }
})();

(async () => {
  try {
    const snap = await getDoc(doc(db, "competitions", COMPETITION_ID, "config", "publicResults"));
    const data = snap.exists() ? snap.data() : {};
    if (!data.published || !Array.isArray(data.entries) || !data.entries.length) {
      $("#rows").innerHTML = `<tr><td colspan="8" class="empty">Results aren't published yet. Please check back later.</td></tr>`;
      return;
    }
    ENTRIES = data.entries.map(e => ({ ...e, sub: cleanAgeLabel(e.sub) }));
    CATS = Array.isArray(data.categories) ? data.categories : [];
    $("#subtabs").style.display = "";
    render();
    if (data.updatedAt?.toDate) {
      $("#updated").textContent = "Last updated " + data.updatedAt.toDate().toLocaleString("en-GB");
    }
  } catch (err) {
    console.warn("results load failed:", err);
    $("#rows").innerHTML = `<tr><td colspan="8" class="empty">Couldn't load results. Please try again later.</td></tr>`;
  }
})();
</script>
</body>
</html>
