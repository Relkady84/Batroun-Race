<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Race-day scanner — Batroun Race</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap">
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --bg1:#08172b;--bg2:#0d2140;
    --ink:#ecf6ff;--muted:#9fb2c8;--line:rgba(255,255,255,.16);
    --accent:#3dd6c6;--accent2:#21b3a7;
    --good:#27cbbb;--bad:#ff6b6b;--warn:#ffa726;
  }
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%;
            background:linear-gradient(180deg,var(--bg1),var(--bg2));color:var(--ink);
            font:16px/1.55 'Inter',system-ui,-apple-system,Segoe UI,Roboto;
            -webkit-font-smoothing:antialiased}
  .wrap{max-width:520px;margin:0 auto;padding:18px 14px}
  header{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:14px}
  h1{margin:0;font-size:clamp(20px,4.5vw,28px);font-weight:900;letter-spacing:-.01em;
     background:linear-gradient(180deg,#fff 0%,#d8efea 70%,var(--accent) 100%);
     -webkit-background-clip:text;background-clip:text;color:transparent}
  .user{font-size:.85rem;color:var(--muted)}
  .signout{background:transparent;color:var(--ink);border:1px solid var(--line);
           border-radius:8px;padding:5px 10px;font-size:.8rem;cursor:pointer}

  /* Sign-in screen */
  .login{min-height:80vh;display:grid;place-items:center}
  .login .box{background:rgba(255,255,255,.04);border:1px solid var(--line);
              border-radius:18px;padding:24px;text-align:center;max-width:380px;width:100%}
  .login h2{margin:0 0 6px}
  .login p{color:var(--muted);margin:0 0 18px}
  .google-btn{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#222;
              border:none;border-radius:10px;padding:12px 18px;font-weight:800;cursor:pointer}
  .err{color:var(--bad);margin-top:12px;font-size:.9rem;min-height:1.2em;font-weight:700}

  /* Scanner */
  #qr-reader{background:#000;border:1px solid var(--line);border-radius:14px;overflow:hidden}
  #qr-reader video{max-width:100%}
  .hint{color:var(--muted);text-align:center;margin:12px 0;font-size:.9rem}

  /* Result card */
  .result{margin-top:14px;border-radius:16px;padding:18px;border:2px solid var(--line);
          background:rgba(0,0,0,.25);box-shadow:0 18px 50px rgba(0,0,0,.5)}
  .result.ok   {border-color:var(--good);background:rgba(39,203,187,.08)}
  .result.bad  {border-color:var(--bad);background:rgba(255,107,107,.08)}
  .result.warn {border-color:var(--warn);background:rgba(255,167,38,.08)}
  .result h2{margin:0 0 8px;font-size:1.8rem;font-weight:900;letter-spacing:.01em}
  .result.ok   h2{color:var(--good)}
  .result.bad  h2{color:var(--bad)}
  .result.warn h2{color:var(--warn)}
  .result .row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed rgba(255,255,255,.08);font-size:.95rem}
  .result .row:last-child{border:0}
  .result .row .k{color:var(--muted)}
  .result .row .v{font-weight:700;text-align:right;word-break:break-word}
  .result code{font-family:ui-monospace,Menlo,monospace;color:var(--accent)}

  .btn{display:block;width:100%;margin-top:14px;padding:14px;border-radius:12px;border:none;
       font-weight:800;font-size:1rem;cursor:pointer;
       background:linear-gradient(180deg,var(--accent),var(--accent2));color:#062028}
  .btn.sec{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn:active{transform:translateY(1px)}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🏁 Race-day scanner</h1>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="user" id="userEmail"></span>
      <button id="signOutBtn" class="signout" hidden>Sign out</button>
    </div>
  </header>

  <!-- Sign-in -->
  <div id="loginScreen" class="login">
    <div class="box">
      <h2>Sign in to scan</h2>
      <p>Use one of the approved admin or staff Google accounts.</p>
      <button id="signInBtn" class="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.13-.85 2.08-1.8 2.72v2.26h2.92c1.7-1.57 2.68-3.88 2.68-6.62z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.83.87-3.04.87-2.34 0-4.32-1.58-5.03-3.71H.96v2.33A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.97 10.72A5.42 5.42 0 0 1 3.68 9c0-.6.1-1.18.29-1.72V4.95H.96A8.997 8.997 0 0 0 0 9c0 1.45.35 2.83.96 4.05l3.01-2.33z" fill="#FBBC05"/>
          <path d="M9 3.58c1.32 0 2.51.46 3.44 1.35l2.58-2.58C13.46.89 11.42 0 9 0A8.997 8.997 0 0 0 .96 4.95l3.01 2.33C4.68 5.16 6.66 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </button>
      <div id="signInError" class="err"></div>
    </div>
  </div>

  <!-- Scanner -->
  <div id="scannerScreen" hidden>
    <div id="qr-reader"></div>
    <div class="hint">Point the camera at the runner's QR code (on their phone or printout). Or paste a reference below.</div>
    <input id="manualRef" type="text" placeholder="Or type a reference, e.g. BTN-2026-AB3K"
           style="width:100%;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.3);color:var(--ink);font:inherit;text-transform:uppercase;letter-spacing:1px">
    <button id="manualLookup" class="btn sec" style="margin-top:8px">Look up reference</button>
    <div id="result"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult,
  signOut, onAuthStateChanged, browserLocalPersistence, setPersistence
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
import {
  getFirestore, collection, query, where, getDocs, doc, getDoc, updateDoc,
  onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyChNfEHu5FhaNIe1Y7_Q_SaVSXmfHcfUQA",
  authDomain: "batroun-race.firebaseapp.com",
  projectId: "batroun-race",
  storageBucket: "batroun-race.firebasestorage.app",
  messagingSenderId: "175612171118",
  appId: "1:175612171118:web:96fc6e09ec599758f9277f",
  measurementId: "G-Z3FQ9B2QJZ"
};
const SUPER_ADMINS = ["raedelkady@gmail.com", "nizarelkady@gmail.com"];
let dynamicAdmins = [];
let dynamicViewers = [];
let dynamicScanners = [];   // scanner-only staff — this page is all they can use
function isAllowed(email) {
  return SUPER_ADMINS.includes(email)
      || dynamicAdmins.includes(email)
      || dynamicViewers.includes(email)
      || dynamicScanners.includes(email);
}
const COMPETITION_ID = "batroun-race-2026";

// Fields the admin can choose to display on the result card.
const SCANNER_FIELD_LABELS = {
  name:              "Name",
  bibNumber:         "Bib",
  categoryName:      "Category",
  subQuestionAnswer: "Age category",
  whishReference:    "Reference",
  paymentStatus:     "Payment",
  ageOnRaceDay:      "Age",
  gender:            "Gender",
  tshirtSize:        "T-shirt",
  club:              "Club",
  nationality:       "Nationality",
  city:              "City",
  email:             "Email",
  phone:             "Phone",
  priceUSD:          "Price paid",
  paymentMethod:     "Payment method",
  registeredAt:      "Registered"
};
const DEFAULT_SCANNER_FIELDS = ["name","bibNumber","categoryName","subQuestionAnswer","whishReference","paymentStatus"];
let scannerFields = DEFAULT_SCANNER_FIELDS.slice();

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
setPersistence(auth, browserLocalPersistence).catch(() => {});

// Watch the admin-defined scanner field config
onSnapshot(
  doc(db, "competitions", COMPETITION_ID, "config", "scanner"),
  snap => {
    if (snap.exists() && Array.isArray(snap.data().fields) && snap.data().fields.length) {
      scannerFields = snap.data().fields;
    } else {
      scannerFields = DEFAULT_SCANNER_FIELDS.slice();
    }
  },
  () => {}
);

function fieldValue(r, key) {
  if (key === "name") return `${r.firstName || ""} ${r.lastName || ""}`.trim();
  if (key === "registeredAt") return fmtDateTime(r.registeredAt);
  if (key === "priceUSD") return r.priceUSD ? `$${r.priceUSD}` : "Free";
  return r[key];
}

const $ = s => document.querySelector(s);
let scanner = null;

// Auth
$("#signInBtn").addEventListener("click", async () => {
  $("#signInError").textContent = "";
  try {
    await signInWithPopup(auth, new GoogleAuthProvider().setCustomParameters({ prompt:"select_account" }));
  } catch (e) {
    if (e.code === "auth/popup-blocked" || e.code === "auth/operation-not-supported-in-this-environment") {
      await signInWithRedirect(auth, new GoogleAuthProvider());
    } else if (e.code !== "auth/popup-closed-by-user") {
      $("#signInError").textContent = e.message || "Sign-in failed.";
    }
  }
});
$("#signOutBtn").addEventListener("click", () => { stopScanner(); signOut(auth); });
getRedirectResult(auth).catch(() => {});

let pendingAuthUser = null;
let accessLoaded = false;

onAuthStateChanged(auth, user => {
  if (!user) { pendingAuthUser = null; return showLogin(); }
  pendingAuthUser = user;
  evaluateAuth();
});

function evaluateAuth() {
  if (!pendingAuthUser || !accessLoaded) return;
  const user = pendingAuthUser;
  const email = (user.email || "").toLowerCase();
  if (!isAllowed(email)) {
    $("#signInError").innerHTML = `Access denied for <code>${email}</code>.`;
    signOut(auth);
    return;
  }
  $("#userEmail").textContent = user.email;
  $("#signOutBtn").hidden = false;
  showScanner();
}

// Load access config (admins + viewers added via admin Settings tab)
onSnapshot(
  doc(db, "competitions", COMPETITION_ID, "config", "access"),
  snap => {
    const data = snap.exists() ? snap.data() : {};
    dynamicAdmins   = (Array.isArray(data.admins)   ? data.admins   : []).map(e => String(e).toLowerCase());
    dynamicViewers  = (Array.isArray(data.viewers)  ? data.viewers  : []).map(e => String(e).toLowerCase());
    dynamicScanners = (Array.isArray(data.scanners) ? data.scanners : []).map(e => String(e).toLowerCase());
    accessLoaded = true;
    evaluateAuth();
  },
  () => { accessLoaded = true; evaluateAuth(); }
);

function showLogin() {
  $("#loginScreen").style.display = "grid";
  $("#scannerScreen").hidden = true;
  $("#signOutBtn").hidden = true;
  stopScanner();
}
function showScanner() {
  $("#loginScreen").style.display = "none";
  $("#scannerScreen").hidden = false;
  startScanner();
}

function startScanner() {
  if (scanner) return;
  if (!window.Html5Qrcode) {
    $("#qr-reader").innerHTML = "<div style='padding:20px;color:#fff'>QR library failed to load. Check your connection.</div>";
    return;
  }
  scanner = new Html5Qrcode("qr-reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 240, height: 240 } },
    onScanSuccess,
    () => {} // ignore per-frame decode failures
  ).catch(err => {
    console.error(err);
    $("#qr-reader").innerHTML = `<div style="padding:20px;color:#fff">Couldn't access the camera: ${err.message}<br><br>You can still type the reference manually below.</div>`;
    scanner = null;
  });
}
function stopScanner() {
  if (scanner) {
    scanner.stop().catch(() => {}).finally(() => { scanner = null; });
  }
}

async function onScanSuccess(decoded) {
  if (scanner) { scanner.pause(true); }
  await lookupAndShow(decoded.trim());
}

$("#manualLookup").addEventListener("click", () => {
  const v = $("#manualRef").value.trim().toUpperCase();
  if (v) lookupAndShow(v);
});

async function lookupAndShow(ref) {
  $("#result").innerHTML = `<div class="result"><h2 style="color:var(--muted)">Looking up…</h2><code>${ref}</code></div>`;
  try {
    // Doc ID is the whish reference (since PR #12), so a single get-by-id
    // is the right path: one round-trip, no list permission needed,
    // strongly consistent.
    const docSnap = await getDoc(doc(db, "competitions", COMPETITION_ID, "registrations", ref));
    if (!docSnap.exists()) {
      $("#result").innerHTML = `<div class="result bad"><h2>❌ Not found</h2><div class="row"><span class="k">Scanned</span><span class="v"><code>${ref}</code></span></div><div class="row"><span class="k">Status</span><span class="v">No registration matches this code.</span></div></div>`;
      addRescan();
      return;
    }
    const r = { id: docSnap.id, ...docSnap.data() };
    // Record the scan (best-effort, non-blocking) so admins can spot tickets
    // that were scanned but never marked BIB-received — i.e. the operator
    // forgot to press the button. Skip soft-deleted docs. Failure is silent;
    // showing the card is the primary job.
    if (!r.deletedAt) {
      updateDoc(doc(db, "competitions", COMPETITION_ID, "registrations", r.id), {
        scannedAt: serverTimestamp(),
        scannedBy: auth.currentUser?.email || "unknown"
      }).catch(e => console.warn("scan tracking failed:", e.message));
    }
    // Pull the category's bib colour so the scanned bib number shows in the
    // same colour it has on the ticket. Stored on the category (not the
    // registration), so one extra get. Non-fatal if it fails — the bib just
    // renders in the default colour. Kept on r (transient _bibColor) so
    // re-renders after check-in preserve it.
    if (r.categoryId) {
      try {
        const catSnap = await getDoc(doc(db, "competitions", COMPETITION_ID, "categories", r.categoryId));
        if (catSnap.exists()) r._bibColor = catSnap.data().bibColor || null;
      } catch (_) { /* leave uncoloured */ }
    }
    renderResult(r);
  } catch (err) {
    console.error(err);
    $("#result").innerHTML = `<div class="result bad"><h2>⚠ Error</h2><div class="row"><span class="k">Message</span><span class="v">${err.message}</span></div></div>`;
    addRescan();
  }
}

function renderResult(r) {
  if (r.deletedAt) {
    $("#result").innerHTML =
      `<div class="result bad"><h2>❌ Deleted</h2>
        <div class="row"><span class="k">Reference</span><span class="v"><code>${r.whishReference}</code></span></div>
        <div class="row"><span class="k">Status</span><span class="v">This registration was deleted. Refer to admin.</span></div>
      </div>`;
    addRescan();
    return;
  }
  const isPaid = r.paymentStatus === "paid" || r.paymentStatus === "free";

  // Relay teams: one bib + one ref shared, but BOTH teammates need to be
  // checked in. checkedInAt = Person 1, teammateCheckedInAt = Person 2.
  const hasTeammate    = !!r.teammate && !!(r.teammate.firstName || r.teammate.lastName);
  const p1CheckedIn    = !!r.checkedInAt;
  const p2CheckedIn    = !!r.teammateCheckedInAt;
  const teamFullyIn    = hasTeammate && p1CheckedIn && p2CheckedIn;
  const alreadyCheckedIn = hasTeammate ? teamFullyIn : p1CheckedIn;

  const p1Name = `${r.firstName || ""} ${r.lastName || ""}`.trim() || "Person 1";
  const p2Name = hasTeammate
    ? (`${r.teammate.firstName || ""} ${r.teammate.lastName || ""}`.trim() || "Person 2")
    : "";

  // Headline depends on paid + check-in state (per-person for relay).
  let headline, cls;
  if (!isPaid) { headline = "❌ NOT PAID"; cls = "bad"; }
  else if (!hasTeammate) {
    cls = p1CheckedIn ? "warn" : "ok";
    headline = p1CheckedIn ? "⚠ BIB ALREADY RECEIVED" : "✅ PAID";
  } else if (teamFullyIn) {
    cls = "warn"; headline = "⚠ RELAY TEAM ALREADY COMPLETE";
  } else if (!p1CheckedIn) {
    cls = "ok"; headline = `✅ PAID · RELAY · Mark Person 1 received`;
  } else {
    cls = "ok"; headline = `🔁 RELAY · Person 1 received · Now Person 2`;
  }

  // Only trust a strict #RRGGBB hex before dropping it into an inline style.
  const safeBibColor = /^#[0-9a-fA-F]{6}$/.test(r._bibColor || "") ? r._bibColor : null;

  const rows = scannerFields.map(key => {
    const label = SCANNER_FIELD_LABELS[key] || key;
    let val = fieldValue(r, key);
    if (val == null || val === "") val = "—";
    let html;
    if (key === "whishReference") {
      html = `<code>${escapeHtml(val)}</code>`;
    } else if (key === "bibNumber" && safeBibColor && val !== "—") {
      // Keep the bib number in its category colour, same as on the ticket.
      html = `<span style="color:${safeBibColor};font-weight:800">${escapeHtml(val)}</span>`;
    } else {
      html = escapeHtml(val);
    }
    return `<div class="row"><span class="k">${label}</span><span class="v">${html}</span></div>`;
  }).join("");

  // For relay teams, show the per-person check-in summary inline.
  const relayBlock = hasTeammate ? `
    <div class="row"><span class="k">Person 1</span><span class="v">${escapeHtml(p1Name)} ${
      p1CheckedIn ? `<span style="color:var(--accent);font-weight:700">✓ ${fmtDateTime(r.checkedInAt)}</span>` : "<em style='color:#ffae50'>pending</em>"
    }</span></div>
    <div class="row"><span class="k">Person 2</span><span class="v">${escapeHtml(p2Name)} ${
      p2CheckedIn ? `<span style="color:var(--accent);font-weight:700">✓ ${fmtDateTime(r.teammateCheckedInAt)}</span>` : "<em style='color:#ffae50'>pending</em>"
    }</span></div>` : "";

  // Determine the next action.
  const canCheckPerson1 = isPaid && hasTeammate && !p1CheckedIn;
  const canCheckPerson2 = isPaid && hasTeammate && p1CheckedIn && !p2CheckedIn;
  const canCheckSolo    = isPaid && !hasTeammate && !p1CheckedIn;

  let actionBtn = "";
  if (canCheckSolo)    actionBtn = `<button class="btn" id="checkInBtn">Mark BIB received → hand out bib</button>`;
  if (canCheckPerson1) actionBtn = `<button class="btn" id="checkInBtn">Mark Person 1 received (${escapeHtml(p1Name)})</button>`;
  if (canCheckPerson2) actionBtn = `<button class="btn" id="checkInBtn">Mark Person 2 received (${escapeHtml(p2Name)})</button>`;

  // Single-runner already-checked-in details line (kept for non-relay path).
  const soloCheckedLine = !hasTeammate && p1CheckedIn
    ? `<div class="row"><span class="k">BIB received</span><span class="v">${fmtDateTime(r.checkedInAt)}<br><small>by ${escapeHtml(r.checkedInBy||"")}</small></span></div>`
    : "";

  $("#result").innerHTML = `
    <div class="result ${cls}">
      <h2>${headline}</h2>
      ${rows}
      ${relayBlock}
      ${soloCheckedLine}
      ${actionBtn}
      <button class="btn sec" id="rescanBtn">Scan another</button>
    </div>
  `;
  const btn = document.getElementById("checkInBtn");
  if (btn) {
    btn.onclick = async () => {
      try {
        const patch = canCheckPerson2
          ? { teammateCheckedInAt: serverTimestamp(), teammateCheckedInBy: auth.currentUser?.email || "unknown" }
          : { checkedInAt: serverTimestamp(),       checkedInBy:       auth.currentUser?.email || "unknown" };
        await updateDoc(doc(db, "competitions", COMPETITION_ID, "registrations", r.id), patch);
        renderResult({
          ...r,
          ...(canCheckPerson2
            ? { teammateCheckedInAt: new Date(), teammateCheckedInBy: auth.currentUser?.email }
            : { checkedInAt: new Date(), checkedInBy: auth.currentUser?.email })
        });
      } catch (e) {
        alert("BIB receive failed: " + e.message);
      }
    };
  }
  document.getElementById("rescanBtn").onclick = rescan;
}

function addRescan() {
  const div = document.createElement("button");
  div.className = "btn sec";
  div.textContent = "Scan another";
  div.onclick = rescan;
  $("#result").appendChild(div);
}

function rescan() {
  $("#result").innerHTML = "";
  $("#manualRef").value = "";
  if (scanner) scanner.resume();
  else startScanner();
}

function fmtDateTime(ts) {
  if (!ts) return "—";
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleString("en-GB", { day:"2-digit", month:"short", hour:"2-digit", minute:"2-digit" });
}
function escapeHtml(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
</script>
</body>
</html>
